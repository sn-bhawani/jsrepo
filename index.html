<!-- HTML Template (or) Boilerplate -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form | HOMEPAGE</title>
    <script src="js_types.js" type="text/javascript">

    </script>


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #f7f7f7;
        }

        form {
            width: 400px;
            height: auto;
            position: absolute;
            padding: 20px;
            animation: load 0.3s;
            margin: 0;
            box-shadow: 0 1px 2px #d3d3d3;
            top: 50%;
            bottom: 50%;
            place-self: center;
            background-color: white;
        }

        @keyframes load {
            0% {
                scale: 0;
            }
        }

        form .logo {
            width: 100%;
            height: 100px;
            margin-bottom: 20px;
            background-image: url(https://logowik.com/content/uploads/images/parul-university9542.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        form h3 {
            text-align: center;
            margin-bottom: 30px;
        }


        form input {
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            position: relative;
            border: 1px solid #ececec;
            margin: 10px 0px;
        }


        form input[type=submit] {
            width: 100%;
            background-color: rgb(0, 0, 0);
            border: none;
            color: white;
            border-radius: 30px;
            padding: 10px;
            cursor: pointer;
            display: flex;
        }
    </style>
</head>

<body>

    <form action="#" method="POST">
        <div class="logo"></div>
        <h3>Welcome to Parul University</h3>
        <label for="username">User Name</label><br>
        <input type="text" id="username" placeholder="" value="S.N. BHAWANI" required>
        <br>
        <label for="password">Password</label><br>
        <input type="password" id="password" placeholder="" value="snbs@25" required>
        <br>
        <input type="submit" value="Login" onclick="login()">
    </form>


    <script>

        function login() {
            var uname = document.getElementById("username").value;
            var pwd = document.getElementById("password").value;
            if (uname.toLowerCase() === "s.n. bhawani" && pwd.toLowerCase() === "snbs@25") {
                document.write("<style> @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap'); *{font-family: 'Montserrat';}</style><h1 style='color: rebeccapurple;'>Welcome to Parul University @ GCF Training </h1>");


                var data = "<b>Name</b>: S.N. Bhawani Sankar Sahu <br> <b>Branch</b>: CSE CORE <br> <b>City</b>: Kesinga <br> <b>Hobbies</b>: Playing guitar, football, games";
                document.write(data);
            } else {
                alert("Invalid login credentials!");
            }
        }

    </script>

</body>

</html>
